<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Dinamis - KPM Enterprise</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { 
            dark: '#0F172A',
            primary: '#1E3A8A', // Deep Blue Contrast
            accent: '#F59E0B',
            surface: '#FFFFFF',
            background: '#F1F5F9'
          }
        } 
      } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    body { background-color: #F1F5F9; color: #0F172A; }
    .card-table { background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
    .input-modern { width: 100%; border: 2px solid #E2E8F0; border-radius: 8px; padding: 12px 16px; font-weight: 600; color: #0F172A; transition: all 0.2s ease; outline: none; background: #F8FAFC;}
    .input-modern:focus { border-color: #1E3A8A; background: #FFFFFF; box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1); }
    .label-modern { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; margin-bottom: 6px; display: block; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo } = React;

    // ==========================================
    // MASUKKAN URL DEPLOY GAS ANDA DI SINI
    // ==========================================
    const GAS_URL = "ISI_DENGAN_URL_WEB_APP_GAS_ANDA_DISINI"; 

    function App() {
      const [data, setData] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [activeSheet, setActiveSheet] = useState('Master_Data'); // Default berdasarkan gambar
      const [view, setView] = useState('table'); // 'table' atau 'form'
      const [formData, setFormData] = useState({});
      const [searchQuery, setSearchQuery] = useState('');

      useEffect(() => {
        if(GAS_URL !== "ISI_DENGAN_URL_WEB_APP_GAS_ANDA_DISINI") {
          fetchData();
        } else {
          alert("PERHATIAN: Anda belum memasukkan URL GAS di dalam kode HTML!");
        }
      }, [activeSheet]);

      const fetchData = async () => {
        setIsLoading(true);
        try {
          // Cache buster agar tidak nyangkut
          const url = `${GAS_URL}?action=get_data&sheet=${activeSheet}&t=${Date.now()}`;
          const response = await fetch(url, { redirect: 'follow' });
          const json = await response.json();
          
          if (json.status === 'success' && json.data.length > 0) {
            setData(json.data);
            // DINAMIS: Ambil nama kolom langsung dari data Spreadsheet
            const extractedHeaders = Object.keys(json.data[0]).filter(key => key !== 'rowIndex');
            setHeaders(extractedHeaders);
          } else {
            setData([]);
            // Jika kosong, minimal kita tidak error
          }
        } catch (err) {
          console.error("Gagal menarik data:", err);
          alert("Gagal terhubung ke Database. Pastikan URL GAS benar.");
        } finally {
          setIsLoading(false);
        }
      };

      const handleInputChange = (header, value) => {
        setFormData({ ...formData, [header]: value });
      };

      const saveData = async () => {
        setIsLoading(true);
        try {
          const payload = {
            action: "save_record",
            sheetName: activeSheet,
            payload: formData,
            rowIndex: formData.rowIndex || null
          };

          const res = await fetch(GAS_URL, {
            method: 'POST',
            redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          
          const result = await res.json();
          if (result.status === 'success') {
            setView('table');
            fetchData(); // Refresh data
          } else {
            alert("Gagal menyimpan data.");
          }
        } catch (err) {
          alert("Terjadi kesalahan jaringan.");
        } finally {
          setIsLoading(false);
        }
      };

      const deleteData = async (rowIndex) => {
        if (!confirm("Hapus data ini dari sistem?")) return;
        setIsLoading(true);
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            redirect: 'follow',
            body: JSON.stringify({ action: "delete_record", sheetName: activeSheet, rowIndex: rowIndex })
          });
          const result = await res.json();
          if (result.status === 'success') fetchData();
        } catch (err) {
          alert("Gagal menghapus.");
        } finally {
          setIsLoading(false);
        }
      };

      const openForm = (item = null) => {
        if (item) {
          setFormData(item);
        } else {
          // Form kosong sesuai header yang ada
          const emptyForm = {};
          headers.forEach(h => emptyForm[h] = "");
          setFormData(emptyForm);
        }
        setView('form');
      };

      const filteredData = useMemo(() => {
        if (!searchQuery) return data;
        return data.filter(item => 
          Object.values(item).some(val => 
            String(val).toLowerCase().includes(searchQuery.toLowerCase())
          )
        );
      }, [data, searchQuery]);

      return (
        <div className="max-w-6xl mx-auto p-4 md:p-8 min-h-screen">
          
          {/* HEADER KONTRAST TINGGI */}
          <div className="bg-primary rounded-2xl p-6 md:p-8 mb-8 shadow-xl text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
              <h1 className="text-3xl font-black tracking-tight mb-2">SYSTEM DATABASE</h1>
              <p className="text-blue-200 font-medium text-sm">Sinkronisasi Dinamis & Auto-Mapping Aktif</p>
            </div>
            
            <div className="w-full md:w-auto flex gap-3">
              <select 
                value={activeSheet} 
                onChange={(e) => setActiveSheet(e.target.value)}
                className="bg-white text-dark font-bold px-4 py-3 rounded-xl outline-none shadow-sm cursor-pointer flex-1 md:w-48 border-2 border-transparent focus:border-accent"
              >
                <option value="Master_Data">Sheet: Master_Data</option>
                <option value="Data_KPM">Sheet: Data_KPM</option>
                <option value="Monitoring">Sheet: Monitoring</option>
                <option value="Komponen_ART">Sheet: Komponen_ART</option>
              </select>
              
              <button onClick={() => fetchData()} className="bg-accent text-white px-5 py-3 rounded-xl font-bold shadow-sm hover:brightness-110 transition">
                <i className={`fas fa-sync-alt ${isLoading ? 'animate-spin' : ''}`}></i>
              </button>
            </div>
          </div>

          {/* VIEW: TABLE / CARDS */}
          {view === 'table' && (
            <div className="space-y-6">
              
              {/* Toolbar */}
              <div className="flex flex-col md:flex-row justify-between gap-4 mb-2">
                <div className="relative flex-1 max-w-md">
                  <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input 
                    type="text" 
                    placeholder="Cari data apa saja..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-slate-200 focus:border-primary outline-none font-semibold text-dark shadow-sm"
                  />
                </div>
                <button onClick={() => openForm()} className="bg-dark text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md flex items-center justify-center gap-2">
                  <i className="fas fa-plus"></i> TAMBAH DATA
                </button>
              </div>

              {/* Data Grid / Card Table */}
              {isLoading && data.length === 0 ? (
                <div className="text-center py-20 text-slate-400 font-bold"><i className="fas fa-circle-notch fa-spin text-4xl mb-4 text-primary"></i><br/>MENARIK DATA...</div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  {filteredData.map((item, idx) => (
                    <div key={idx} className="card-table p-0 flex flex-col hover:border-primary transition duration-300">
                      {/* Card Body - Dinamis membaca kolom */}
                      <div className="p-6 flex-1 space-y-4">
                        {headers.slice(0, 5).map((header, i) => (
                          <div key={i}>
                            <span className="label-modern">{header.replace(/_/g, ' ')}</span>
                            <span className="font-bold text-dark text-sm break-words">{item[header] || '-'}</span>
                          </div>
                        ))}
                        {headers.length > 5 && (
                          <div className="text-xs font-bold text-slate-400 italic">... +{headers.length - 5} kolom lainnya</div>
                        )}
                      </div>
                      
                      {/* Card Footer Actions */}
                      <div className="bg-slate-50 border-t border-slate-200 p-4 flex justify-end gap-3">
                        <button onClick={() => openForm(item)} className="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-700 hover:text-primary hover:border-primary transition">
                          EDIT
                        </button>
                        <button onClick={() => deleteData(item.rowIndex)} className="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold hover:bg-red-100 transition">
                          HAPUS
                        </button>
                      </div>
                    </div>
                  ))}
                  {filteredData.length === 0 && !isLoading && (
                     <div className="col-span-full text-center py-20 bg-white border-2 border-dashed border-slate-300 rounded-2xl text-slate-500 font-bold">
                       DATA KOSONG / TIDAK DITEMUKAN
                     </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* VIEW: FORM DINAMIS */}
          {view === 'form' && (
            <div className="max-w-3xl mx-auto card-table p-6 md:p-10 shadow-2xl">
              <div className="flex justify-between items-center mb-8 border-b-2 border-slate-100 pb-4">
                <h2 className="text-2xl font-black text-dark tracking-tight">
                  {formData.rowIndex ? 'EDIT DATA' : 'INPUT DATA BARU'}
                </h2>
                <button onClick={() => setView('table')} className="w-10 h-10 rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 flex items-center justify-center font-bold">
                  <i className="fas fa-times"></i>
                </button>
              </div>

              {/* Form Input Generator Otomatis */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                {headers.map((header, idx) => (
                  <div key={idx} className={header.length > 20 || header.includes('ALAMAT') ? "md:col-span-2" : ""}>
                    <label className="label-modern">{header.replace(/_/g, ' ')}</label>
                    {header.toLowerCase().includes('alamat') ? (
                      <textarea 
                        className="input-modern h-24 resize-none" 
                        value={formData[header] || ''} 
                        onChange={(e) => handleInputChange(header, e.target.value)}
                      ></textarea>
                    ) : (
                      <input 
                        type="text" 
                        className="input-modern" 
                        value={formData[header] || ''} 
                        onChange={(e) => handleInputChange(header, e.target.value)}
                      />
                    )}
                  </div>
                ))}
                {headers.length === 0 && (
                  <div className="col-span-full text-red-500 font-bold bg-red-50 p-4 rounded-xl">
                    Sistem belum mendeteksi nama kolom. Pastikan ada minimal 1 baris judul/header di Spreadsheet Anda.
                  </div>
                )}
              </div>

              <button 
                onClick={saveData} 
                disabled={isLoading || headers.length === 0}
                className="w-full py-4 bg-primary hover:bg-blue-900 text-white rounded-xl font-black tracking-widest transition shadow-lg disabled:opacity-50"
              >
                {isLoading ? 'MENYIMPAN...' : 'SIMPAN KE DATABASE'}
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
