<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-Monitoring KPM Enterprise - Fast Sync</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { 
            corporate: '#0B1B3D', corporateLight: '#1A365D', accent: '#F59E0B', surface: '#FFFFFF', background: '#F1F5F9', textMain: '#0F172A', textMuted: '#475569'
          }
        } 
      } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F1F5F9; color: #0F172A; -webkit-tap-highlight-color: transparent; }
    .card-modern { background-color: #FFFFFF; border: 1px solid #E2E8F0; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-radius: 16px; overflow: hidden; }
    .input-corporate { width: 100%; background-color: #F8FAFC; border: 2px solid #E2E8F0; border-radius: 10px; padding: 12px 16px; outline: none; color: #0F172A; font-weight: 600; font-size: 14px; transition: all 0.2s; }
    .input-corporate:focus { border-color: #0B1B3D; background-color: #FFFFFF; box-shadow: 0 0 0 4px rgba(11, 27, 61, 0.1); }
    .input-corporate:disabled { background-color: #E2E8F0; color: #94A3B8; cursor: not-allowed; }
    .label-corporate { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #475569; margin-bottom: 6px; display: block; }
    
    /* TRANSISI MENU HALUS ELEGAN */
    @keyframes smoothFade { from { opacity: 0; transform: translateY(6px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-slide { animation: smoothFade 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background-color: #CBD5E1; border-radius: 10px; }
    * { touch-action: manipulation; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useMemo, useRef } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycby_7rAmJQh9CM9Zcl0eqmApjga1JtTwX410VcrRDURnZdSARCdtS247saQeK-raJkNF/exec"; 
    const SYSTEM_COLS = ["ID_KPM", "Tanggal_Terdaftar", "Terakhir_Update", "rowIndex"];

    function App() {
      const [view, setView] = useState('dashboard');
      const [allSheetsData, setAllSheetsData] = useState({});
      const [kpmHeaders, setKpmHeaders] = useState([]);
      const [kpmData, setKpmData] = useState([]);
      
      const [isSyncing, setIsSyncing] = useState(false); 
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [searchQuery, setSearchQuery] = useState('');
      
      const [filterKecamatan, setFilterKecamatan] = useState('');
      const [filterDesa, setFilterDesa] = useState('');

      const [formData, setFormData] = useState({});
      const [fileUploads, setFileUploads] = useState({}); 

      // State Khusus Smart Filter Monitoring
      const [monKec, setMonKec] = useState('');
      const [monDesa, setMonDesa] = useState('');
      const [monKpm, setMonKpm] = useState('');

      useEffect(() => { fetchData(); }, []);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
      };

      const callAPI = async (payload) => {
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST', redirect: 'follow',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
            body: JSON.stringify(payload)
          });
          return await res.json();
        } catch (err) { console.error(err); return null; }
      };

      const fetchData = async () => {
        if(kpmData.length === 0) setIsSyncing(true); 
        try {
          const url = `${GAS_URL}?action=get_all_data&t=${new Date().getTime()}`;
          const response = await fetch(url, { method: 'GET', redirect: 'follow' });
          const json = JSON.parse(await response.text());
          
          if (json && json.status === 'success') {
            setAllSheetsData(json.data);
            if (json.data['Data_KPM']) {
              setKpmHeaders(json.data['Data_KPM'].headers || []);
              setKpmData(json.data['Data_KPM'].rows || []);
            }
          }
        } catch (e) { showToast('Gagal menarik data database', 'error'); } 
        finally { setIsSyncing(false); }
      };

      const handleInputChange = (colName, value) => {
        setFormData(prev => ({...prev, [colName]: value}));
      };

      const handleFileChange = (e, colName) => {
        const file = e.target.files[0];
        if(!file) return;
        if(file.size > 2000000) return showToast('Maksimal ukuran foto 2MB', 'error'); 

        const reader = new FileReader();
        reader.onloadend = () => {
          setFileUploads(prev => ({
            ...prev,
            [colName]: { base64: reader.result, name: file.name, type: file.type }
          }));
        };
        reader.readAsDataURL(file);
      };

      const addNewColumn = async () => {
        const colName = prompt("Masukkan nama kolom baru (contoh: Pekerjaan_Suami atau Foto_Anak):");
        if(!colName) return;
        
        setIsSyncing(true);
        const res = await callAPI({ action: "add_column", sheetName: "Data_KPM", newColumnName: colName });
        if(res && res.status === 'success') {
          showToast(`Kolom ${res.colName} berhasil ditambahkan!`, 'success');
          setKpmHeaders(prev => [...prev, res.colName]); 
        }
        setIsSyncing(false);
      };

      const saveKPM = async () => {
        if(!formData.Nama_Pengurus || !formData.Kecamatan || !formData.Desa) {
          return showToast('Nama, Kecamatan, dan Desa wajib diisi!', 'error');
        }
        
        showToast('🔄 Menyimpan data di latar belakang...', 'success');
        setView('data'); 
        setIsSyncing(true);

        let finalData = { ...formData };
        finalData.ID_KPM = formData.ID_KPM || ('KPM' + Date.now().toString().slice(-6));

        for (const colName in fileUploads) {
          const fileData = fileUploads[colName];
          const uploadResult = await callAPI({
            action: "upload_file", base64: fileData.base64, filename: fileData.name, mimeType: fileData.type
          });
          if (uploadResult && uploadResult.status === 'success') finalData[colName] = uploadResult.url;
        }

        const updatedRowIndex = formData.rowIndex || Date.now();
        finalData.rowIndex = updatedRowIndex;
        
        if (formData.rowIndex) {
          setKpmData(prev => prev.map(item => item.rowIndex === formData.rowIndex ? finalData : item));
        } else {
          setKpmData(prev => [finalData, ...prev]);
        }
        
        const success = await callAPI({ action: "save_record", sheetName: "Data_KPM", payload: finalData, rowIndex: formData.rowIndex });
        if(success) { showToast('✅ Data sukses disinkronkan!', 'success'); fetchData(); } 
        else { showToast('❌ Gagal sinkron ke database.', 'error'); }
        setIsSyncing(false);
        setFileUploads({});
      };

      const deleteKPM = async (rowIndex) => {
        if(!confirm("Hapus data KPM ini permanen?")) return;
        setKpmData(prev => prev.filter(item => item.rowIndex !== rowIndex));
        showToast('Menghapus di latar belakang...', 'success');
        await callAPI({ action: "delete_record", sheetName: "Data_KPM", rowIndex: rowIndex });
        fetchData();
      };

      // ==========================================
      // OPTIMISTIC MONITORING ENGINE (TANPA LOADING)
      // ==========================================
      const handleOptimisticMonitoring = (idKpm, targetCol, newVal) => {
        // 1. Ubah UI Detik Itu Juga
        setAllSheetsData(prev => {
          const monSheet = prev['Monitoring'] || { headers: ['ID_KPM'], rows: [] };
          const rows = [...monSheet.rows];
          const idx = rows.findIndex(r => r.ID_KPM === idKpm);
          
          if (idx > -1) rows[idx] = { ...rows[idx], [targetCol]: newVal };
          else rows.push({ ID_KPM: idKpm, [targetCol]: newVal });
          
          return { ...prev, Monitoring: { ...monSheet, rows } };
        });

        // 2. Tembak GAS di Latar Belakang Tanpa Jeda
        callAPI({
          action: "update_monitoring", idKpm: idKpm, kolomTarget: targetCol, nilaiTarget: newVal
        });
      };

      // Rekap Cepat untuk Card Atas Monitoring
      const rekapMonitoring = useMemo(() => {
        if(!monKpm || !allSheetsData['Monitoring']) return { hadir: 0, disalurkan: 0 };
        const record = allSheetsData['Monitoring'].rows.find(r => r.ID_KPM === monKpm);
        if(!record) return { hadir: 0, disalurkan: 0 };
        
        let hadir = 0; let disalurkan = 0;
        for(let i=1; i<=12; i++) if(record[`P2K2_Bln_${i}`] === 'Hadir') hadir++;
        for(let i=1; i<=4; i++) {
          const v = record[`Penyaluran_Tahap_${i}`];
          if(v && v !== 'Belum Salur' && v !== 'Belum' && v !== '') disalurkan++;
        }
        return { hadir, disalurkan };
      }, [monKpm, allSheetsData]);

      const activeMonRecord = useMemo(() => {
        if (!monKpm || !allSheetsData['Monitoring']) return {};
        return allSheetsData['Monitoring'].rows.find(r => r.ID_KPM === monKpm) || {};
      }, [monKpm, allSheetsData]);

      // FILTER & SORTING A-Z (DATA KPM)
      const uniqueKecamatan = useMemo(() => [...new Set(kpmData.map(item => item.Kecamatan).filter(Boolean))], [kpmData]);
      const uniqueDesa = useMemo(() => {
        if (!filterKecamatan) return [];
        return [...new Set(kpmData.filter(item => item.Kecamatan === filterKecamatan).map(item => item.Desa).filter(Boolean))];
      }, [kpmData, filterKecamatan]);

      const filteredAndSortedData = useMemo(() => {
        let result = kpmData.filter(item => {
          const matchKecamatan = filterKecamatan ? item.Kecamatan === filterKecamatan : true;
          const matchDesa = filterDesa ? item.Desa === filterDesa : true;
          const matchSearch = searchQuery ? (String(item.Nama_Pengurus).toLowerCase().includes(searchQuery.toLowerCase()) || String(item.ID_KPM).toLowerCase().includes(searchQuery.toLowerCase())) : true;
          return matchKecamatan && matchDesa && matchSearch;
        });
        return result.sort((a, b) => String(a.Nama_Pengurus || '').localeCompare(String(b.Nama_Pengurus || '')));
      }, [kpmData, filterKecamatan, filterDesa, searchQuery]);

      // SMART FILTER DROPDOWNS (MONITORING)
      const monUniqueDesa = useMemo(() => {
        if (!monKec) return [];
        return [...new Set(kpmData.filter(item => item.Kecamatan === monKec).map(item => item.Desa).filter(Boolean))];
      }, [kpmData, monKec]);

      const monFilteredKpmList = useMemo(() => {
        if (!monDesa) return [];
        return kpmData
          .filter(item => item.Kecamatan === monKec && item.Desa === monDesa)
          .sort((a, b) => String(a.Nama_Pengurus || '').localeCompare(String(b.Nama_Pengurus || '')));
      }, [kpmData, monKec, monDesa]);

      const handleMenuClick = (menuId) => {
        setView(menuId);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      return (
        <div className="max-w-2xl mx-auto min-h-screen bg-background relative pb-24 shadow-2xl">
          
          {toast.show && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] animate-slide w-[90%] max-w-md">
              <div className={`bg-white p-4 rounded-xl shadow-xl border-l-8 flex items-center gap-3 ${toast.type === 'success' ? 'border-green-500 text-green-700' : 'border-red-500 text-red-700'}`}>
                {isSyncing ? <i className="fas fa-spinner fa-spin text-xl"></i> : <i className={`fas ${toast.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-xl`}></i>}
                <p className="font-bold text-sm leading-tight">{toast.message}</p>
              </div>
            </div>
          )}

          <div className="bg-corporate px-6 pt-12 pb-10 rounded-b-[2rem] relative z-20 shadow-xl">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h1 className="text-3xl font-black text-surface tracking-tight">SDM PKH Pro</h1>
                <div className="flex items-center mt-1 gap-2">
                  <p className="text-accent text-xs font-bold tracking-widest uppercase">Sistem Enterprise</p>
                  {isSyncing && <span className="flex h-2 w-2 relative"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-accent"></span></span>}
                </div>
              </div>
              <button onClick={fetchData} className="w-12 h-12 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center border border-white/20 transition">
                <i className={`fas fa-sync-alt text-surface text-lg ${isSyncing ? 'fa-spin' : ''}`}></i>
              </button>
            </div>
            
            {view !== 'form_kpm' && view !== 'monitoring' && (
              <div className="relative mt-2 animate-slide">
                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-corporateLight text-lg"></i>
                <input type="text" placeholder="Cari Nama KPM / ID..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-surface border-0 text-textMain rounded-xl py-4 pl-12 pr-4 outline-none focus:ring-4 focus:ring-accent/40 font-bold text-sm shadow-inner transition-all" />
              </div>
            )}
          </div>

          <div className="p-6 relative z-10 space-y-6 -mt-6">
            
            {view === 'dashboard' && (
              <div className="animate-slide space-y-6">
                <div className="grid grid-cols-2 gap-4">
                  <div className="card-modern p-6 flex flex-col items-center justify-center text-center border-b-4 border-b-corporate">
                    <h3 className="text-4xl font-black text-corporate">{filteredAndSortedData.length}</h3>
                    <p className="label-corporate mt-2">KPM Ditampilkan</p>
                  </div>
                  <div className="card-modern p-6 flex flex-col items-center justify-center text-center border-b-4 border-b-accent">
                    <h3 className="text-4xl font-black text-accent">{filteredAndSortedData.filter(d => d.Status_Graduasi && d.Status_Graduasi !== 'Belum Graduasi').length}</h3>
                    <p className="label-corporate mt-2">Total Graduasi</p>
                  </div>
                </div>

                <div className="card-modern overflow-hidden">
                  <div onClick={() => handleMenuClick('form_kpm')} className="flex items-center p-5 cursor-pointer hover:bg-slate-50 transition border-b border-slate-100 group">
                    <div className="w-14 h-14 bg-corporate text-surface rounded-2xl flex items-center justify-center mr-5 shadow-md group-hover:scale-105 transition"><i className="fas fa-user-plus text-xl"></i></div>
                    <div className="flex-1">
                      <h4 className="font-black text-textMain text-base">Registrasi KPM Baru</h4>
                      <p className="text-xs text-textMuted mt-1 font-medium">Input biodata & upload dokumen</p>
                    </div>
                    <i className="fas fa-chevron-right text-slate-300"></i>
                  </div>
                  <div onClick={() => handleMenuClick('monitoring')} className="flex items-center p-5 cursor-pointer hover:bg-slate-50 transition group">
                    <div className="w-14 h-14 bg-accent text-corporate rounded-2xl flex items-center justify-center mr-5 shadow-md group-hover:scale-105 transition"><i className="fas fa-clipboard-check text-xl"></i></div>
                    <div className="flex-1">
                      <h4 className="font-black text-textMain text-base">Update Monitoring</h4>
                      <p className="text-xs text-textMuted mt-1 font-medium">Ceklis Penyaluran & Absen P2K2</p>
                    </div>
                    <i className="fas fa-chevron-right text-slate-300"></i>
                  </div>
                </div>
              </div>
            )}

            {view === 'data' && (
              <div className="animate-slide space-y-5">
                <div className="flex gap-4">
                  <select value={filterKecamatan} onChange={(e) => { setFilterKecamatan(e.target.value); setFilterDesa(''); }} className="input-corporate bg-white shadow-sm flex-1 text-xs">
                    <option value="">Semua Kecamatan</option>
                    {uniqueKecamatan.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                  </select>
                  <select value={filterDesa} onChange={(e) => setFilterDesa(e.target.value)} className="input-corporate bg-white shadow-sm flex-1 text-xs" disabled={!filterKecamatan}>
                    <option value="">Semua Desa</option>
                    {uniqueDesa.map(desa => <option key={desa} value={desa}>{desa}</option>)}
                  </select>
                </div>

                <div className="space-y-5">
                  {filteredAndSortedData.map((item, index) => (
                    <div key={index} className="card-modern p-0 flex flex-col relative overflow-hidden group">
                      {(item.Status_Graduasi && item.Status_Graduasi !== 'Belum Graduasi') && 
                        <div className="absolute top-0 right-0 bg-accent text-white text-[10px] font-black px-4 py-1.5 rounded-bl-xl tracking-widest z-10 shadow-sm">{item.Status_Graduasi.toUpperCase()}</div>
                      }
                      
                      <div className="p-5 flex items-start">
                        {(item.Foto_KPM || item.Foto_URL) ? (
                          <img src={item.Foto_KPM || item.Foto_URL} className="w-20 h-20 rounded-2xl object-cover border-2 border-slate-100 mr-5 shadow-sm" alt="profil" />
                        ) : (
                          <div className="w-20 h-20 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center mr-5 border-2 border-slate-200"><i className="fas fa-camera text-2xl"></i></div>
                        )}
                        
                        <div className="flex-1 pt-1">
                          <h4 className="font-black text-corporate text-lg leading-tight mb-1">{item.Nama_Pengurus}</h4>
                          <div className="inline-block bg-slate-100 text-slate-600 px-2 py-1 rounded font-mono text-[10px] font-bold mb-2">ID: {item.ID_KPM}</div>
                          <p className="text-xs text-textMuted font-semibold leading-relaxed">
                            <i className="fas fa-map-marker-alt text-accent mr-2"></i>{item.Desa}, Kec. {item.Kecamatan}
                          </p>
                        </div>
                      </div>
                      
                      <div className="bg-slate-50 flex border-t border-slate-100 divide-x divide-slate-100">
                        <button onClick={() => { setFormData(item); setFileUploads({}); setView('form_kpm'); }} className="flex-1 py-3 text-sm font-bold text-corporate hover:bg-slate-100 transition"><i className="fas fa-pen mr-2"></i> EDIT DATA</button>
                        <button onClick={() => deleteKPM(item.rowIndex)} className="flex-1 py-3 text-sm font-bold text-red-600 hover:bg-red-50 transition"><i className="fas fa-trash mr-2"></i> HAPUS</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* VIEW: MONITORING ENTERPRISE (SMART FILTER & CEKLIS INSTAN) */}
            {view === 'monitoring' && (
              <div className="animate-slide space-y-6">
                
                {/* SMART FILTER PANEL */}
                <div className="card-modern p-5 bg-white border-t-4 border-t-accent space-y-4 shadow-lg">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="label-corporate">1. Kecamatan</label>
                      <select className="input-corporate text-xs" value={monKec} onChange={(e) => { setMonKec(e.target.value); setMonDesa(''); setMonKpm(''); }}>
                        <option value="">-- Kecamatan --</option>
                        {uniqueKecamatan.map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="label-corporate">2. Desa</label>
                      <select className="input-corporate text-xs" value={monDesa} onChange={(e) => { setMonDesa(e.target.value); setMonKpm(''); }} disabled={!monKec}>
                        <option value="">-- Desa --</option>
                        {monUniqueDesa.map(d => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="label-corporate text-corporate">3. Pilih Penerima Manfaat (A - Z)</label>
                    <select className="input-corporate border-corporate text-sm" value={monKpm} onChange={(e) => setMonKpm(e.target.value)} disabled={!monDesa}>
                      <option value="">-- {monDesa ? 'Pilih Nama KPM Terdaftar' : 'Pilih Desa Terlebih Dahulu'} --</option>
                      {monFilteredKpmList.map(item => <option key={item.ID_KPM} value={item.ID_KPM}>{item.Nama_Pengurus} ({item.ID_KPM})</option>)}
                    </select>
                  </div>
                </div>

                {/* AREA CEKLIS INSTAN (MUNCUL JIKA NAMA TERPILIH) */}
                {monKpm && (
                  <div className="space-y-6 animate-slide">
                    
                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                      <div>
                        <p className="text-[10px] font-black text-blue-800 uppercase tracking-widest">Total Absen P2K2</p>
                        <p className="text-2xl font-black text-corporate mt-0.5">{rekapMonitoring.hadir} <span className="text-xs font-normal text-slate-500">/ 12 Bln</span></p>
                      </div>
                      <div className="text-right">
                        <p className="text-[10px] font-black text-amber-700 uppercase tracking-widest">Penyaluran</p>
                        <p className="text-2xl font-black text-accent mt-0.5">{rekapMonitoring.disalurkan} <span className="text-xs font-normal text-slate-500">/ 4 Tahap</span></p>
                      </div>
                    </div>

                    {/* DUA KOLOM SAJA */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      
                      {/* KOLOM KIRI: ABSEN P2K2 */}
                      <div className="card-modern p-5 border-t-4 border-t-corporate">
                        <h4 className="font-black text-corporate text-sm uppercase tracking-wider mb-4 pb-2 border-b flex items-center gap-2">
                          <i className="fas fa-user-check text-accent"></i> Absensi P2K2 (12 Bulan)
                        </h4>
                        <div className="divide-y divide-slate-100">
                          {Array.from({ length: 12 }, (_, i) => i + 1).map(bln => {
                            const colKey = `P2K2_Bln_${bln}`;
                            const currentVal = activeMonRecord[colKey] || '';
                            const isHadir = currentVal === 'Hadir';

                            return (
                              <div key={bln} className="py-2.5 flex items-center justify-between">
                                <span className="text-xs font-bold text-slate-700">Bulan {bln}</span>
                                
                                <div className="flex items-center gap-2">
                                  <button 
                                    onClick={() => handleOptimisticMonitoring(monKpm, colKey, isHadir ? '' : 'Hadir')}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-black flex items-center gap-1.5 transition-all active:scale-95 ${isHadir ? 'bg-green-600 text-white shadow' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
                                  >
                                    <i className={`fas ${isHadir ? 'fa-check-square' : 'fa-square'}`}></i> Hadir
                                  </button>

                                  {!isHadir && (
                                    <div className="flex bg-slate-100 p-0.5 rounded-lg border border-slate-200 animate-slide">
                                      {['Izin', 'Alpa'].map(st => (
                                        <button
                                          key={st}
                                          onClick={() => handleOptimisticMonitoring(monKpm, colKey, currentVal === st ? '' : st)}
                                          className={`px-2 py-1 text-[10px] font-extrabold rounded transition ${currentVal === st ? (st === 'Izin' ? 'bg-amber-500 text-white' : 'bg-red-600 text-white') : 'text-slate-500 hover:text-black'}`}
                                        >
                                          {st}
                                        </button>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* KOLOM KANAN: PENYALURAN TAHAP 1-4 */}
                      <div className="card-modern p-5 border-t-4 border-t-accent h-fit">
                        <h4 className="font-black text-corporate text-sm uppercase tracking-wider mb-4 pb-2 border-b flex items-center gap-2">
                          <i className="fas fa-boxes text-green-600"></i> Ceklis Penyaluran
                        </h4>
                        <div className="divide-y divide-slate-100 space-y-3">
                          {[1, 2, 3, 4].map(tahap => {
                            const colKey = `Penyaluran_Tahap_${tahap}`;
                            const currentVal = activeMonRecord[colKey] || '';
                            
                            const isPkh = currentVal.includes('PKH') || currentVal === 'Tersalurkan';
                            const isSembako = currentVal.includes('Sembako') || currentVal === 'Tersalurkan';

                            const handleSalurToggle = (type) => {
                              let nextPkh = isPkh; let nextSembako = isSembako;
                              if (type === 'PKH') nextPkh = !nextPkh;
                              if (type === 'Sembako') nextSembako = !nextSembako;

                              let valToSend = '';
                              if (nextPkh && nextSembako) valToSend = 'Salur PKH & Sembako';
                              else if (nextPkh) valToSend = 'Salur PKH Saja';
                              else if (nextSembako) valToSend = 'Salur Sembako Saja';
                              else valToSend = 'Belum Salur';

                              handleOptimisticMonitoring(monKpm, colKey, valToSend);
                            };

                            return (
                              <div key={tahap} className="pt-3 pb-1">
                                <div className="flex justify-between items-center mb-2">
                                  <span className="text-xs font-black text-corporate">Tahap {tahap}</span>
                                  <span className={`text-[9px] font-black px-2 py-0.5 rounded tracking-wider uppercase ${currentVal && currentVal !== 'Belum Salur' ? 'bg-green-100 text-green-800' : 'bg-slate-100 text-slate-400'}`}>
                                    {currentVal || 'Belum Salur'}
                                  </span>
                                </div>

                                <div className="grid grid-cols-2 gap-2">
                                  <button
                                    onClick={() => handleSalurToggle('PKH')}
                                    className={`py-2.5 px-3 rounded-xl border text-xs font-black flex items-center justify-center gap-2 transition-all active:scale-95 ${isPkh ? 'bg-corporate border-corporate text-white shadow-md' : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100'}`}
                                  >
                                    <i className={`fas ${isPkh ? 'fa-check-circle text-accent' : 'fa-circle'}`}></i> PKH
                                  </button>

                                  <button
                                    onClick={() => handleSalurToggle('Sembako')}
                                    className={`py-2.5 px-3 rounded-xl border text-xs font-black flex items-center justify-center gap-2 transition-all active:scale-95 ${isSembako ? 'bg-amber-500 border-amber-500 text-white shadow-md' : 'bg-slate-50 border-slate-200 text-slate-400 hover:bg-slate-100'}`}
                                  >
                                    <i className={`fas ${isSembako ? 'fa-check-circle text-white' : 'fa-circle'}`}></i> SEMBAKO
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                    </div>

                  </div>
                )}

              </div>
            )}

            {view === 'form_kpm' && (
              <div className="animate-slide card-modern p-6 md:p-8">
                <div className="flex justify-between items-center mb-6 pb-4 border-b-2 border-slate-100">
                  <h2 className="font-black text-corporate text-xl leading-tight">
                    {formData?.rowIndex ? 'Edit Database' : 'Registrasi KPM'}
                  </h2>
                  <button onClick={() => setView('dashboard')} className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition">
                    <i className="fas fa-times text-lg"></i>
                  </button>
                </div>

                <div className="space-y-5">
                  {kpmHeaders.filter(header => !SYSTEM_COLS.includes(header)).map((header, idx) => {
                    const isFile = header.toLowerCase().includes('foto') || header.toLowerCase().includes('berkas');
                    if (isFile) {
                      return (
                        <div key={idx} className="mb-4">
                          <label className="label-corporate">{header.replace(/_/g, ' ')}</label>
                          <label className="block border-2 border-dashed border-slate-300 rounded-2xl p-4 mt-1 bg-slate-50 text-center hover:bg-slate-100 transition cursor-pointer">
                            <input type="file" onChange={(e) => handleFileChange(e, header)} className="hidden" accept="image/*,application/pdf" />
                            {fileUploads[header] ? (
                              <div><i className="fas fa-check-circle text-2xl text-green-500 mb-2"></i><p className="font-bold text-xs text-corporate">{fileUploads[header].name}</p></div>
                            ) : formData[header] ? (
                              <div><i className="fas fa-image text-2xl text-accent mb-2"></i><p className="font-bold text-xs text-corporate">File Tersimpan (Klik ubah)</p></div>
                            ) : (
                              <div><i className="fas fa-cloud-upload-alt text-2xl text-corporate mb-2"></i><p className="font-bold text-xs text-corporate">Klik Upload Dokumen</p></div>
                            )}
                          </label>
                        </div>
                      );
                    }
                    return (
                      <div key={idx} className="mb-4">
                        <label className="label-corporate">{header.replace(/_/g, ' ')}</label>
                        {header === 'Status_Graduasi' ? (
                          <select className="input-corporate" value={formData[header] || 'Belum Graduasi'} onChange={(e) => handleInputChange(header, e.target.value)}>
                            <option value="Belum Graduasi">Belum Graduasi</option>
                            <option value="Graduasi Mandiri">Graduasi Mandiri</option>
                            <option value="Graduasi Alamiah">Graduasi Alamiah</option>
                          </select>
                        ) : header === 'Alamat' ? (
                          <textarea className="input-corporate h-24 resize-none" value={formData[header] || ''} onChange={(e) => handleInputChange(header, e.target.value)}></textarea>
                        ) : (
                          <input type={header.toLowerCase().includes('jumlah') || header.toLowerCase().includes('nik') ? 'number' : 'text'} className="input-corporate" value={formData[header] || ''} onChange={(e) => handleInputChange(header, e.target.value)} />
                        )}
                      </div>
                    );
                  })}

                  <button onClick={addNewColumn} className="w-full py-3 mt-2 border-2 border-dashed border-accent text-accent rounded-xl font-bold text-sm hover:bg-accent/10 transition flex items-center justify-center gap-2">
                    <i className="fas fa-plus-circle"></i> Tambah Kolom Input Baru
                  </button>

                  <button onClick={saveKPM} className="w-full py-4 bg-corporate hover:bg-corporateLight text-surface rounded-xl font-black text-sm tracking-widest transition mt-6 shadow-xl flex items-center justify-center gap-2">
                    <i className="fas fa-save"></i> SIMPAN OTOMATIS
                  </button>
                </div>
              </div>
            )}
          </div>

          <div className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 z-50 shadow-[0_-10px_25px_-5px_rgba(0,0,0,0.1)] pb-safe">
            <div className="max-w-2xl mx-auto flex justify-around px-2 py-3">
              {[ { id: 'dashboard', icon: 'fa-chart-pie', label: 'Beranda' }, { id: 'data', icon: 'fa-address-book', label: 'Data KPM' }, { id: 'monitoring', icon: 'fa-tasks', label: 'Monitoring' }].map((item) => (
                <div key={item.id} onClick={() => handleMenuClick(item.id)} className="flex flex-col items-center justify-center w-1/3 cursor-pointer">
                  <div className={`transition-all duration-200 ${view === item.id ? 'text-corporate scale-110' : 'text-slate-400 hover:text-slate-600'}`}>
                    <i className={`fas ${item.icon} text-2xl`}></i>
                  </div>
                  <span className={`text-[10px] font-bold mt-1.5 transition-colors ${view === item.id ? 'text-corporate' : 'text-slate-400'}`}>{item.label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
