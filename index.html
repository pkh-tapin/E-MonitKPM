<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>E-Monitoring PKH Premium</title>
  
  <!-- FontAwesome untuk stabilitas tanpa build system -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM (Versi UMD Global - Bebas Error Import) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Modern Glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    
    .dark .glass-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .header-gradient {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    }
    
    .dark .header-gradient {
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
    }

    /* Form Inputs */
    .input-modern {
      @apply w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-slate-800 dark:text-slate-100 font-medium text-sm;
    }

    /* Animations */
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    
    ::-webkit-scrollbar { display: none; } /* Clean mobile look */
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 antialiased transition-colors duration-300">
  
  <div id="root"></div>

  <!-- Script type text/babel (TIDAK MENGGUNAKAN IMPORT) -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycby_7rAmJQh9CM9Zcl0eqmApjga1JtTwX410VcrRDURnZdSARCdtS247saQeK-raJkNF/exec"; 

    function App() {
      const [view, setView] = useState('dashboard');
      const [kpmData, setKpmData] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
      const [searchQuery, setSearchQuery] = useState('');
      
      // States Wilayah
      const [lockedKecamatan, setLockedKecamatan] = useState(localStorage.getItem('locked_kecamatan') || '');
      const [filterKecamatan, setFilterKecamatan] = useState(localStorage.getItem('locked_kecamatan') || '');
      const [filterDesa, setFilterDesa] = useState('');

      // State Form Monitoring
      const [selectedKPM, setSelectedKPM] = useState('');
      const [statusSalur, setStatusSalur] = useState('Belum Transaksi');
      
      // Theme
      const [darkMode, setDarkMode] = useState(localStorage.getItem('theme') === 'dark');

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [darkMode]);

      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async () => {
        setIsLoading(true);
        try {
          const response = await fetch(`${GAS_URL}?action=get_kpm_data`);
          const json = await response.json();
          
          if (json.data) {
            const formattedData = json.data.map(item => ({
              id: item.ID_KPM || item['ID KPM'] || item.id || item.NIK || '-',
              nama: item.Nama_Pengurus || item['NAMA PENGURUS'] || item.NAMA || item.nama || '-',
              kecamatan: item.Kecamatan || item.KECAMATAN || item.kecamatan || '-',
              desa: item.Desa || item.DESA || item.desa || item.Kelurahan || '-',
              kategori: item.Jumlah_Komponen || item.Kategori || item.KATEGORI || item.kategori || '-',
              status: item.Status || 'Belum Transaksi'
            }));
            setKpmData(formattedData);
            showToast('Data berhasil disinkronisasi', 'success');
          } else {
            showToast('Format tabel server tidak sesuai', 'error');
          }
        } catch (error) {
          showToast('Mode Offline: Menampilkan data lokal', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 3500);
      };

      // Real API POST simulation
      const handleSaveMonitoring = async () => {
        if (!selectedKPM) return showToast('Pilih KPM terlebih dahulu!', 'error');
        
        setIsLoading(true);
        try {
          // Implementasi fetch POST ke Firebase/GAS akan berada di sini.
          await new Promise(resolve => setTimeout(resolve, 1200)); 
          showToast(`Laporan ${selectedKPM} tersimpan ke database!`, 'success');
          setView('dashboard');
        } catch (error) {
          showToast('Gagal menyimpan laporan', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      const uniqueKecamatan = useMemo(() => [...new Set(kpmData.map(item => item.kecamatan))], [kpmData]);
      const uniqueDesa = useMemo(() => {
        if (!filterKecamatan) return [];
        return [...new Set(kpmData.filter(item => item.kecamatan === filterKecamatan).map(item => item.desa))];
      }, [kpmData, filterKecamatan]);

      const filteredData = useMemo(() => {
        return kpmData.filter(item => {
          const matchKecamatan = filterKecamatan ? item.kecamatan === filterKecamatan : true;
          const matchDesa = filterDesa ? item.desa === filterDesa : true;
          const matchSearch = searchQuery ? 
            (item.nama.toLowerCase().includes(searchQuery.toLowerCase()) || item.id.includes(searchQuery)) : true;
          return matchKecamatan && matchDesa && matchSearch;
        });
      }, [kpmData, filterKecamatan, filterDesa, searchQuery]);

      return (
        <div className="max-w-[480px] mx-auto min-h-screen bg-slate-50 dark:bg-slate-900 shadow-2xl relative pb-24 overflow-x-hidden transition-colors duration-300">
          
          {/* TOAST NOTIFICATION */}
          {toast.show && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] w-[90%] max-w-[400px] animate-slideUp">
              <div className={`flex items-center p-4 rounded-2xl shadow-xl text-white backdrop-blur-md border border-white/20 ${toast.type === 'success' ? 'bg-emerald-600/90' : 'bg-rose-600/90'}`}>
                <i className={`fas ${toast.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-3 text-lg`}></i>
                <span className="font-semibold tracking-wide text-sm">{toast.message}</span>
              </div>
            </div>
          )}

          {/* LOADING OVERLAY */}
          {isLoading && (
            <div className="fixed inset-0 z-[90] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center">
              <div className="glass-card p-8 rounded-[2rem] flex flex-col items-center animate-slideUp">
                <i className="fas fa-sync-alt text-blue-500 animate-spin text-4xl mb-4"></i>
                <h3 className="text-slate-800 dark:text-white font-bold text-lg">Memproses...</h3>
              </div>
            </div>
          )}

          {/* HEADER */}
          <div className="header-gradient p-6 pt-10 pb-8 rounded-b-[2.5rem] relative z-20 shadow-xl">
            <div className="flex justify-between items-start mb-6">
              <div>
                <span className="inline-block bg-blue-500/30 text-blue-100 text-[10px] font-bold px-3 py-1 rounded-full mb-3 backdrop-blur-md border border-blue-400/30 tracking-widest uppercase">
                  V.3.0 Enterprise
                </span>
                <h1 className="text-3xl font-extrabold text-white tracking-tight">E-Monit KPM</h1>
              </div>
              <button 
                onClick={() => setDarkMode(!darkMode)} 
                className="w-10 h-10 bg-white/10 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/20 hover:bg-white/20 transition-all"
              >
                 <i className={`fas ${darkMode ? 'fa-sun text-amber-300' : 'fa-moon text-blue-100'}`}></i>
              </button>
            </div>
            
            <div className="relative group">
              <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-blue-300 group-focus-within:text-blue-500 transition-colors"></i>
              <input 
                type="text" 
                placeholder="Cari Nama / ID KPM..." 
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full bg-white/10 border border-white/20 text-white placeholder-blue-200/80 rounded-2xl py-3.5 pl-12 pr-4 outline-none focus:bg-white focus:text-slate-900 focus:border-white transition-all shadow-inner font-medium text-sm backdrop-blur-md"
              />
            </div>
          </div>

          {/* MAIN CONTENT AREA */}
          <div className="p-5 relative -mt-4 z-10 space-y-5">
            
            {/* VIEW: DASHBOARD */}
            {view === 'dashboard' && (
              <div className="animate-slideUp space-y-5">
                <div className="glass-card p-5 border-l-4 border-l-blue-500 flex justify-between items-center rounded-2xl">
                   <div>
                     <p className="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-1">Wilayah Fokus</p>
                     <h3 className="font-extrabold text-slate-800 dark:text-white text-sm">
                       {lockedKecamatan ? `Kec. ${lockedKecamatan}` : 'Semua Wilayah'}
                     </h3>
                   </div>
                   <button onClick={() => setView('settings')} className="text-xs bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg font-bold">
                     Ubah
                   </button>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div className="glass-card p-5 text-center rounded-3xl relative overflow-hidden">
                    <div className="w-12 h-12 mx-auto bg-blue-100 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mb-3 text-xl">
                      <i className="fas fa-users"></i>
                    </div>
                    <h3 className="text-3xl font-extrabold text-slate-800 dark:text-white mb-1">{filteredData.length}</h3>
                    <p className="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">Total KPM</p>
                  </div>
                  
                  <div className="glass-card p-5 text-center rounded-3xl relative overflow-hidden">
                    <div className="w-12 h-12 mx-auto bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 rounded-2xl flex items-center justify-center mb-3 text-xl">
                      <i className="fas fa-check-circle"></i>
                    </div>
                    <h3 className="text-3xl font-extrabold text-slate-800 dark:text-white mb-1">
                      {filteredData.filter(d => d.status === 'Sudah Transaksi').length}
                    </h3>
                    <p className="text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">Selesai Salur</p>
                  </div>
                </div>

                <div className="pt-2">
                  <h2 className="text-sm font-bold text-slate-800 dark:text-white ml-1 mb-3 flex items-center">Akses Cepat</h2>
                  <div className="glass-card p-2 rounded-2xl space-y-1">
                    <button onClick={() => setView('data')} className="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors group">
                      <div className="flex items-center">
                        <div className="w-10 h-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg flex items-center justify-center mr-3 group-hover:text-blue-500"><i className="fas fa-folder-open"></i></div>
                        <div className="text-left"><h4 className="font-bold text-slate-800 dark:text-slate-100 text-sm">Database KPM</h4><p className="text-[11px] text-slate-500">Lihat & Filter Data Lengkap</p></div>
                      </div>
                      <i className="fas fa-chevron-right text-slate-400 group-hover:text-blue-500"></i>
                    </button>
                    <button onClick={() => setView('monitoring')} className="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors group">
                      <div className="flex items-center">
                        <div className="w-10 h-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-lg flex items-center justify-center mr-3 group-hover:text-orange-500"><i className="fas fa-clipboard-check"></i></div>
                        <div className="text-left"><h4 className="font-bold text-slate-800 dark:text-slate-100 text-sm">Input Monitoring</h4><p className="text-[11px] text-slate-500">Status Salur & Kehadiran</p></div>
                      </div>
                      <i className="fas fa-chevron-right text-slate-400 group-hover:text-orange-500"></i>
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* VIEW: DATA & FILTER */}
            {view === 'data' && (
              <div className="animate-slideUp space-y-5">
                <div className="glass-card p-5 rounded-2xl space-y-4">
                  <div className="flex justify-between items-center pb-3 border-b border-slate-200 dark:border-slate-700">
                    <h2 className="font-bold text-slate-800 dark:text-white text-sm">Filter Spesifik</h2>
                    <button onClick={fetchData} className="text-xs font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-lg flex items-center">
                      <i className="fas fa-sync-alt mr-1"></i> Muat Ulang
                    </button>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Kecamatan</label>
                      <select 
                        value={filterKecamatan} 
                        onChange={(e) => { setFilterKecamatan(e.target.value); setFilterDesa(''); }}
                        className="input-modern" disabled={!!lockedKecamatan}
                      >
                        <option value="">Semua Kec.</option>
                        {uniqueKecamatan.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-[10px] font-bold text-slate-500 uppercase block mb-1">Desa</label>
                      <select 
                        value={filterDesa} 
                        onChange={(e) => setFilterDesa(e.target.value)}
                        className="input-modern" disabled={!filterKecamatan}
                      >
                        <option value="">Semua Desa</option>
                        {uniqueDesa.map(desa => <option key={desa} value={desa}>{desa}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                <div className="space-y-3">
                  {filteredData.length === 0 ? (
                    <div className="text-center py-10 bg-white/50 dark:bg-slate-800/50 rounded-3xl border border-dashed border-slate-300 dark:border-slate-600">
                      <i className="fas fa-database text-4xl text-slate-400 mb-3 block"></i>
                      <p className="text-slate-600 dark:text-slate-300 text-sm font-bold">Data kosong</p>
                    </div>
                  ) : (
                    filteredData.slice(0, 50).map((item, index) => (
                      <div key={index} className="glass-card p-4 rounded-2xl flex flex-col active:scale-[0.98] transition-transform">
                        <div className="flex justify-between items-start mb-3">
                          <div className="flex items-center">
                            <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-blue-800 rounded-lg flex items-center justify-center text-white mr-3 font-bold text-lg">
                              {item.nama.charAt(0)}
                            </div>
                            <div>
                              <h4 className="font-bold text-slate-800 dark:text-slate-100 text-sm">{item.nama}</h4>
                              <p className="text-[10px] text-slate-500 font-mono mt-0.5">ID: {item.id}</p>
                            </div>
                          </div>
                        </div>
                        <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100 dark:border-slate-700/50">
                           <p className="text-[11px] text-slate-600 dark:text-slate-400 font-medium flex items-center">
                             <i className="fas fa-map-marker-alt text-orange-500 mr-2"></i> {item.desa}
                           </p>
                           <span className={`text-[9px] px-2 py-1 rounded-md font-bold uppercase tracking-wider ${item.status === 'Sudah Transaksi' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400' : 'bg-rose-100 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400'}`}>
                             {item.status === 'Sudah Transaksi' ? 'SELESAI' : 'BELUM'}
                           </span>
                        </div>
                      </div>
                    ))
                  )}
                  {filteredData.length > 50 && <p className="text-center text-xs text-slate-500 mt-4">Hanya menampilkan 50 data pertama.</p>}
                </div>
              </div>
            )}

            {/* VIEW: SETTINGS */}
            {view === 'settings' && (
              <div className="animate-slideUp space-y-5">
                <div className="glass-card p-6 rounded-3xl">
                   <h3 className="font-bold text-slate-800 dark:text-white text-base mb-2">Fokus Wilayah (Lock)</h3>
                   <p className="text-[11px] text-slate-500 dark:text-slate-400 mb-5 leading-relaxed">Kunci aplikasi pada kecamatan dampingan Anda untuk mempercepat loading data.</p>
                   
                   <div className="mb-6">
                     <select 
                        value={lockedKecamatan} 
                        onChange={(e) => {
                          setLockedKecamatan(e.target.value);
                          setFilterKecamatan(e.target.value);
                          localStorage.setItem('locked_kecamatan', e.target.value);
                          showToast('Preferensi wilayah disimpan');
                        }}
                        className="input-modern"
                      >
                        <option value="">-- Tampilkan Semua Kecamatan --</option>
                        {uniqueKecamatan.map(kec => <option key={kec} value={kec}>{kec}</option>)}
                      </select>
                   </div>
                </div>
              </div>
            )}

            {/* VIEW: MONITORING */}
            {view === 'monitoring' && (
              <div className="animate-slideUp space-y-5">
                <div className="glass-card p-6 rounded-3xl border-t-4 border-t-orange-500">
                  <div className="mb-5">
                    <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Pilih KPM Tersasar</label>
                    <select 
                      className="input-modern"
                      value={selectedKPM}
                      onChange={(e) => setSelectedKPM(e.target.value)}
                    >
                      <option value="">-- Pilih KPM --</option>
                      {filteredData.slice(0,20).map(item => (
                        <option key={item.id} value={item.id}>{item.nama} - {item.desa}</option>
                      ))}
                    </select>
                  </div>

                  <div className="mb-6">
                    <label className="text-[11px] font-bold text-slate-500 uppercase tracking-widest block mb-2">Status Salur (Tahap Berjalan)</label>
                    <select 
                      className="input-modern"
                      value={statusSalur}
                      onChange={(e) => setStatusSalur(e.target.value)}
                    >
                      <option value="Belum Transaksi">Tahap 1: Belum Transaksi</option>
                      <option value="Sudah Transaksi">Tahap 1: Sudah Transaksi</option>
                    </select>
                  </div>

                  <button 
                    onClick={handleSaveMonitoring} 
                    className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white rounded-xl font-bold text-sm shadow-lg shadow-orange-500/30 flex justify-center items-center transition-all active:scale-[0.98]"
                  >
                    <i className="fas fa-cloud-upload-alt mr-2 text-lg"></i> Simpan Database
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* BOTTOM NAVIGATION */}
          <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 rounded-t-3xl flex justify-around px-2 py-3 z-50">
            {[
              { id: 'dashboard', icon: 'fa-home', label: 'Utama' },
              { id: 'data', icon: 'fa-database', label: 'Data KPM' },
              { id: 'monitoring', icon: 'fa-clipboard-check', label: 'Monitor' },
              { id: 'settings', icon: 'fa-cog', label: 'Seting' }
            ].map((item) => (
              <div key={item.id} onClick={() => setView(item.id)} className="flex flex-col items-center justify-center w-1/4 cursor-pointer group">
                <div className={`relative flex items-center justify-center w-10 h-10 rounded-xl mb-1 transition-all ${view === item.id ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'text-slate-400 dark:text-slate-500'}`}>
                  <i className={`fas ${item.icon} text-lg`}></i>
                </div>
                <span className={`text-[9px] font-bold transition-colors ${view === item.id ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400'}`}>{item.label}</span>
              </div>
            ))}
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
